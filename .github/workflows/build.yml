name: Build fmusim

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: fmusim-linux
            asset_name: fmusim
          - os: macos-latest
            artifact_name: fmusim-macos
            asset_name: fmusim
          - os: windows-latest
            artifact_name: fmusim-windows
            asset_name: fmusim.exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        submodules: recursive

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Run tests
      run: cargo test -p fmusim

    - name: Build release
      run: cargo build --release

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          target/release/${{ matrix.asset_name }}
