name: Build fmusim

env:
  RUST_BACKTRACE: "1"
  CARGO_TERM_VERBOSE: "true"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: fmusim-x86_64-linux
            asset_name: fmusim
          - os: macos-latest
            artifact_name: fmusim-aarch64-darwin
            asset_name: fmusim
          - os: windows-latest
            artifact_name: fmusim-x86_64-windows
            asset_name: fmusim.exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        submodules: recursive

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Run tests
      run: cargo test -p fmusim -- --nocapture

    - name: Build release
      run: cargo build --release

    - name: Stage Artifacts
      shell: bash
      run: |
        mkdir -p dist
        cp target/release/${{ matrix.asset_name }} dist/
        cp README.md dist/
        cp LICENSE dist/

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          dist/
  
  docs:
    name: Build and deploy docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: [build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure Pages environment
        uses: actions/configure-pages@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Download Linux build artifact
        uses: actions/download-artifact@v8
        with:
          name: fmusim-x86_64-linux
          path: artifacts/fmusim-x86_64-linux

      - name: Make binary executable
        run: chmod +x ./artifacts/fmusim-x86_64-linux/fmusim

      - name: Install dependencies
        run: |
          pip install mkdocs-material

      - name: Generate CLI documentation
        run: ./artifacts/fmusim-x86_64-linux/fmusim markdown-help docs/reference.md

      - name: Build documentation
        run: mkdocs build

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
