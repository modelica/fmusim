name: Build fmusim

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: fmusim-x86_64-linux
            asset_name: fmusim
          - os: macos-latest
            artifact_name: fmusim-aarch64-darwin
            asset_name: fmusim
          - os: windows-latest
            artifact_name: fmusim-x86_64-windows
            asset_name: fmusim.exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        submodules: recursive

    - name: Install CMake and build tools
      run: |
        if [ "$RUNNER_OS" == "Linux" ]; then
          sudo apt-get update
          sudo apt-get install -y cmake build-essential
        elif [ "$RUNNER_OS" == "macOS" ]; then
          brew install cmake
        elif [ "$RUNNER_OS" == "Windows" ]; then
          choco install cmake
        fi
      shell: bash

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Run tests
      run: cargo test -p fmusim

    - name: Build release
      run: cargo build --release

    - name: Stage Artifacts
      shell: bash
      run: |
        mkdir -p dist
        cp target/release/${{ matrix.asset_name }} dist/
        cp README.md dist/
        cp LICENSE dist/

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          dist/
