name: Deploy Documentation

on:
  push:
    branches:
      - main  # Change this to master if that's your default branch
  workflow_dispatch: # Allows you to trigger the build manually from the UI

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure Pages environment
        uses: actions/configure-pages@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Download Linux build artifact
        uses: actions/download-artifact@v8
        with:
          name: fmusim-x86_64-linux

      - name: Install dependencies
        run: |
          pip install mkdocs-material

      - name: Generate CLI reference documentation
        run: ./fmusim-x86_64-linux/fmusim markdown-help docs/reference.md

      - name: Build documentation
        run: mkdocs build

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # MkDocs builds the static files into the 'site' directory by default
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5